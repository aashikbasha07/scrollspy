<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap 4 Scrollspy - All In One</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <style>
    body {
      position: relative;
    }

    .section {
      padding-top: 100px;
      padding-bottom: 400px;
    }
  </style>
</head>

<body data-spy="scroll" data-target="#navbar-example" data-offset="70">

<!-- Navigation Bar -->
<nav id="navbar-example"
     class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">

  <a class="navbar-brand" href="#">Scrollspy Demo</a>

  <button class="navbar-toggler" type="button"
          data-toggle="collapse" data-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ml-auto nav-pills">

      <li class="nav-item">
        <a class="nav-link" href="#section1">Home</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#section2">About</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#section3">Services</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#section4">Contact</a>
      </li>

    </ul>
  </div>
</nav>

<!-- Sections -->
<div class="container-fluid mt-5 pt-5">

  <div id="section1" class="section bg-primary text-white">
    <div class="container">
      <h1>Home Section</h1>
      <p>This is the home section content.</p>
    </div>
  </div>

  <div id="section2" class="section bg-light">
    <div class="container">
      <h1>About Section</h1>
      <p>This is the about section content.</p>
    </div>
  </div>

  <div id="section3" class="section bg-success text-white">
    <div class="container">
      <h1>Services Section</h1>
      <p>This is the services section content.</p>
    </div>
  </div>

  <div id="section4" class="section bg-warning">
    <div class="container">
      <h1>Contact Section</h1>
      <p>This is the contact section content.</p>
    </div>
  </div>

</div>

<!-- Required JavaScript -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

</body>
</html>
